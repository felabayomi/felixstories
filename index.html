<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FelixStories</title>
  <meta name="description" content="FelixStories is live on Vercel." />
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      background: radial-gradient(circle at 20% 20%, #f5f1e8 0%, #efe6d8 45%, #e7dccb 100%);
      color: #2c241b;
    }
    main {
      width: min(720px, 90vw);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid #d9ccb9;
      border-radius: 18px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(58, 43, 26, 0.12);
      text-align: center;
    }
    h1 { margin: 0 0 0.8rem; font-size: clamp(2rem, 4vw, 3rem); }
    p { margin: 0; font-size: 1.1rem; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <h1>FelixStories</h1>
    <p>The repository is initialized and now has a live Vercel landing page.</p>
  </main>
</body>
</html>
